<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StakeholderMap — AI Stakeholder Analysis</title>
<meta name="description" content="AI-powered stakeholder analysis, visual mapping, and communication planning">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #0B0F1A; }
  #root { min-height: 100vh; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const COLORS = {
  bg: "#0B0F1A",
  surface: "#131825",
  surfaceHover: "#1A2035",
  card: "#161C2E",
  border: "#232B42",
  borderLight: "#2A3455",
  accent: "#4F8BFF",
  accentGlow: "rgba(79, 139, 255, 0.15)",
  accentSoft: "#3A6FD8",
  warm: "#FF6B4A",
  warmGlow: "rgba(255, 107, 74, 0.15)",
  green: "#34D399",
  greenGlow: "rgba(52, 211, 153, 0.12)",
  yellow: "#FBBF24",
  yellowGlow: "rgba(251, 191, 36, 0.12)",
  purple: "#A78BFA",
  purpleGlow: "rgba(167, 139, 250, 0.12)",
  text: "#E8ECF4",
  textMuted: "#8892A8",
  textDim: "#5A6480",
};

const QUADRANT_META = {
  "Manage Closely": { color: COLORS.warm, glow: COLORS.warmGlow, icon: "🎯", strategy: "High engagement, frequent 1:1s, co-create solutions" },
  "Keep Satisfied": { color: COLORS.purple, glow: COLORS.purpleGlow, icon: "👁️", strategy: "Regular updates, address concerns proactively" },
  "Keep Informed": { color: COLORS.accent, glow: COLORS.accentGlow, icon: "📣", strategy: "Periodic newsletters, group meetings" },
  "Monitor": { color: COLORS.textMuted, glow: "rgba(136, 146, 168, 0.1)", icon: "📋", strategy: "Light touch, monitor for changes" },
};

const CADENCE_OPTIONS = { "Manage Closely": "Weekly 1:1", "Keep Satisfied": "Bi-weekly update", "Keep Informed": "Monthly newsletter", "Monitor": "Quarterly check-in" };

const STORAGE_KEY = "stakeholdermap-data-v2";
const PLANS_KEY = "stakeholdermap-plans-v2";
const USER_KEY = "stakeholdermap-user";
const FREE_LIMIT = 10;

async function loadData(key) {
  try { const r = await Promise.resolve(localStorage.getItem(key) ? { value: localStorage.getItem(key) } : null); return r ? JSON.parse(r.value) : null; } catch { return null; }
}
async function saveData(key, val) {
  try { await Promise.resolve(localStorage.setItem(key, JSON.stringify(val))); } catch {}
}

async function callAI(prompt, systemPrompt, tokens = 1000) {
  try {
    const res = await fetch("/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: tokens, system: systemPrompt, messages: [{ role: "user", content: prompt }] }),
    });
    const data = await res.json();
    if (data.error) { console.error("AI error:", data.error); return "AI error: " + (data.error.message || "unknown"); }
    return data.content?.map(b => b.text || "").join("\n") || "";
  } catch (e) { console.error("AI fetch error:", e); return "AI analysis unavailable."; }
}

function classifyStakeholder(influence, interest) {
  if (influence >= 50 && interest >= 50) return "Manage Closely";
  if (influence >= 50 && interest < 50) return "Keep Satisfied";
  if (influence < 50 && interest >= 50) return "Keep Informed";
  return "Monitor";
}

/* ── Export: Generate SVG of the quadrant map ── */
function generateMapSVG(stakeholders, width = 600, height = 420) {
  const pad = 50;
  const w = width - pad * 2;
  const h = height - pad * 2;
  const sentColors = { champion: "#34D399", supportive: "#6DD4A0", neutral: "#FBBF24", resistant: "#FF9B6A", blocker: "#FF6B4A" };

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" style="font-family:sans-serif">`;
  svg += `<rect width="${width}" height="${height}" fill="#131825" rx="8"/>`;
  // Grid
  svg += `<line x1="${pad}" y1="${pad + h / 2}" x2="${pad + w}" y2="${pad + h / 2}" stroke="#232B42" stroke-width="1"/>`;
  svg += `<line x1="${pad + w / 2}" y1="${pad}" x2="${pad + w / 2}" y2="${pad + h}" stroke="#232B42" stroke-width="1"/>`;
  // Labels
  svg += `<text x="${pad + w * 0.25}" y="${pad + h * 0.25}" fill="#A78BFA" opacity="0.5" text-anchor="middle" font-size="11" font-weight="600">Keep Satisfied</text>`;
  svg += `<text x="${pad + w * 0.75}" y="${pad + h * 0.25}" fill="#FF6B4A" opacity="0.5" text-anchor="middle" font-size="11" font-weight="600">Manage Closely</text>`;
  svg += `<text x="${pad + w * 0.25}" y="${pad + h * 0.75}" fill="#8892A8" opacity="0.5" text-anchor="middle" font-size="11" font-weight="600">Monitor</text>`;
  svg += `<text x="${pad + w * 0.75}" y="${pad + h * 0.75}" fill="#4F8BFF" opacity="0.5" text-anchor="middle" font-size="11" font-weight="600">Keep Informed</text>`;
  // Axis labels
  svg += `<text x="${pad + w / 2}" y="${height - 8}" fill="#5A6480" text-anchor="middle" font-size="10" font-weight="600">INTEREST →</text>`;
  svg += `<text x="12" y="${pad + h / 2}" fill="#5A6480" text-anchor="middle" font-size="10" font-weight="600" transform="rotate(-90, 12, ${pad + h / 2})">INFLUENCE →</text>`;
  // Dots
  stakeholders.forEach(s => {
    const cx = pad + (s.interest / 100) * w;
    const cy = pad + h - (s.influence / 100) * h;
    const col = sentColors[s.sentiment] || "#4F8BFF";
    svg += `<circle cx="${cx}" cy="${cy}" r="7" fill="${col}" opacity="0.9"/>`;
    svg += `<text x="${cx}" y="${cy - 11}" fill="#E8ECF4" text-anchor="middle" font-size="9" font-weight="600">${s.name.split(" ")[0]}</text>`;
  });
  svg += `</svg>`;
  return svg;
}

/* ── Export: Generate PDF (as downloadable HTML report) ── */
function generatePDFReport(stakeholders) {
  const counts = { "Manage Closely": 0, "Keep Satisfied": 0, "Keep Informed": 0, "Monitor": 0 };
  stakeholders.forEach(s => counts[s.quadrant]++);

  const date = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>StakeholderMap Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
@page { size: A4; margin: 0; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; color:#1a1a2e; background:#fff; padding:48px; }
.header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:40px; padding-bottom:24px; border-bottom:2px solid #e5e7eb; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-box { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#4F8BFF,#A78BFA); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; }
.logo span { font-size:18px; font-weight:700; }
.date { color:#6b7280; font-size:13px; }
h1 { font-size:28px; font-weight:800; margin-bottom:8px; letter-spacing:-0.02em; }
h2 { font-size:18px; font-weight:700; margin:28px 0 12px; color:#1a1a2e; }
.subtitle { color:#6b7280; font-size:14px; margin-bottom:32px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:32px; }
.stat { text-align:center; padding:16px; border-radius:10px; background:#f8fafc; border:1px solid #e5e7eb; }
.stat .num { font-size:28px; font-weight:800; }
.stat .label { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }
.map-container { text-align:center; margin:24px 0; }
.map-container img { max-width:100%; border-radius:10px; }
table { width:100%; border-collapse:collapse; margin:16px 0; font-size:13px; }
th { background:#f1f5f9; padding:10px 12px; text-align:left; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.04em; color:#475569; border-bottom:2px solid #e2e8f0; }
td { padding:10px 12px; border-bottom:1px solid #f1f5f9; }
tr:hover td { background:#fafbfc; }
.quadrant-badge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; }
.q-mc { background:#fff1ee; color:#FF6B4A; }
.q-ks { background:#f3f0ff; color:#A78BFA; }
.q-ki { background:#eff6ff; color:#4F8BFF; }
.q-mo { background:#f5f5f5; color:#6b7280; }
.sent { text-transform:capitalize; }
.footer { margin-top:40px; padding-top:20px; border-top:1px solid #e5e7eb; font-size:12px; color:#9ca3af; text-align:center; }
@media print { body { padding:32px; } }
</style></head><body>
<div class="header">
  <div>
    <div class="logo"><div class="logo-box">S</div><span>StakeholderMap</span></div>
  </div>
  <div class="date">${date}</div>
</div>
<h1>Stakeholder Analysis Report</h1>
<p class="subtitle">${stakeholders.length} stakeholders mapped across 4 quadrants</p>
<div class="stats">
  <div class="stat"><div class="num" style="color:#FF6B4A">${counts["Manage Closely"]}</div><div class="label">Manage Closely</div></div>
  <div class="stat"><div class="num" style="color:#A78BFA">${counts["Keep Satisfied"]}</div><div class="label">Keep Satisfied</div></div>
  <div class="stat"><div class="num" style="color:#4F8BFF">${counts["Keep Informed"]}</div><div class="label">Keep Informed</div></div>
  <div class="stat"><div class="num" style="color:#6b7280">${counts["Monitor"]}</div><div class="label">Monitor</div></div>
</div>
<h2>Influence / Interest Matrix</h2>
<div class="map-container"><img src="${svgDataUrl}" alt="Stakeholder Map"/></div>
<h2>Stakeholder Details</h2>
<table>
  <thead><tr><th>Name</th><th>Role</th><th>Department</th><th>Influence</th><th>Interest</th><th>Sentiment</th><th>Quadrant</th></tr></thead>
  <tbody>
  ${stakeholders.map(s => {
    const qClass = s.quadrant === "Manage Closely" ? "q-mc" : s.quadrant === "Keep Satisfied" ? "q-ks" : s.quadrant === "Keep Informed" ? "q-ki" : "q-mo";
    return `<tr><td><strong>${s.name}</strong></td><td>${s.role || "—"}</td><td>${s.department || "—"}</td><td>${s.influence}%</td><td>${s.interest}%</td><td class="sent">${s.sentiment}</td><td><span class="quadrant-badge ${qClass}">${s.quadrant}</span></td></tr>`;
  }).join("")}
  </tbody>
</table>
<h2>Recommended Engagement Strategy</h2>
<table>
  <thead><tr><th>Quadrant</th><th>Strategy</th><th>Cadence</th><th>Stakeholders</th></tr></thead>
  <tbody>
  ${Object.entries(QUADRANT_META).map(([q, meta]) => {
    const names = stakeholders.filter(s => s.quadrant === q).map(s => s.name).join(", ") || "—";
    return `<tr><td><strong>${meta.icon} ${q}</strong></td><td>${meta.strategy}</td><td>${CADENCE_OPTIONS[q]}</td><td>${names}</td></tr>`;
  }).join("")}
  </tbody>
</table>
<div class="footer">Generated by StakeholderMap · stakeholdermap.app</div>
</body></html>`;
  return html;
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadCSV(stakeholders) {
  const headers = ["Name", "Role", "Department", "Influence", "Interest", "Sentiment", "Quadrant", "Notes"];
  const rows = stakeholders.map(s => [s.name, s.role, s.department, s.influence, s.interest, s.sentiment, s.quadrant, s.notes || ""].map(v => `"${String(v).replace(/"/g, '""')}"`).join(","));
  downloadFile([headers.join(","), ...rows].join("\n"), "stakeholdermap-export.csv", "text/csv");
}

// ── Shared Components ──
function Logo() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{
        width: 36, height: 36, borderRadius: 10,
        background: `linear-gradient(135deg, ${COLORS.accent}, ${COLORS.purple})`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 18, fontWeight: 700, color: "#fff",
        boxShadow: `0 0 20px ${COLORS.accentGlow}`,
      }}>S</div>
      <span style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, letterSpacing: "-0.02em" }}>StakeholderMap</span>
    </div>
  );
}

function Button({ children, variant = "primary", onClick, disabled, style = {}, small }) {
  const base = { padding: small ? "6px 14px" : "10px 20px", borderRadius: 8, border: "none", fontSize: small ? 13 : 14, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.2s", opacity: disabled ? 0.5 : 1, fontFamily: "inherit" };
  const variants = {
    primary: { background: COLORS.accent, color: "#fff", boxShadow: `0 2px 12px ${COLORS.accentGlow}` },
    secondary: { background: COLORS.surfaceHover, color: COLORS.text, border: `1px solid ${COLORS.border}` },
    danger: { background: "rgba(255,107,74,0.12)", color: COLORS.warm, border: `1px solid rgba(255,107,74,0.2)` },
    ghost: { background: "transparent", color: COLORS.textMuted },
    warm: { background: COLORS.warm, color: "#fff", boxShadow: `0 2px 12px ${COLORS.warmGlow}` },
    green: { background: COLORS.green, color: "#fff", boxShadow: `0 2px 8px ${COLORS.greenGlow}` },
  };
  return <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}

function Input({ label, value, onChange, placeholder, type = "text", style = {} }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, ...style }}>
      {label && <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</label>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        style={{ padding: "10px 14px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.text, fontSize: 14, outline: "none", fontFamily: "inherit" }}
        onFocus={e => e.target.style.borderColor = COLORS.accent} onBlur={e => e.target.style.borderColor = COLORS.border} />
    </div>
  );
}

function Slider({ label, value, onChange, leftLabel, rightLabel }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between" }}>
        <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</label>
        <span style={{ fontSize: 13, fontWeight: 700, color: COLORS.accent }}>{value}%</span>
      </div>
      <input type="range" min={0} max={100} value={value} onChange={e => onChange(Number(e.target.value))} style={{ width: "100%", accentColor: COLORS.accent }} />
      <div style={{ display: "flex", justifyContent: "space-between" }}>
        <span style={{ fontSize: 11, color: COLORS.textDim }}>{leftLabel}</span>
        <span style={{ fontSize: 11, color: COLORS.textDim }}>{rightLabel}</span>
      </div>
    </div>
  );
}

function Badge({ children, color = COLORS.accent, glow }) {
  return <span style={{ display: "inline-flex", padding: "3px 10px", borderRadius: 6, background: glow || `${color}22`, color, fontSize: 12, fontWeight: 600 }}>{children}</span>;
}

function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{ display: "flex", gap: 2, background: COLORS.surface, borderRadius: 10, padding: 3, flexWrap: "wrap" }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          padding: "8px 16px", borderRadius: 8, border: "none",
          background: active === t.id ? COLORS.surfaceHover : "transparent",
          color: active === t.id ? COLORS.text : COLORS.textMuted,
          fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
          boxShadow: active === t.id ? `0 1px 4px rgba(0,0,0,0.2)` : "none",
        }}>{t.icon} {t.label}</button>
      ))}
    </div>
  );
}

// ── Onboarding ──
function Onboarding({ onComplete }) {
  const [email, setEmail] = useState("");
  const [name, setName] = useState("");
  const [step, setStep] = useState(0);

  if (step === 0) {
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ maxWidth: 440, width: "100%", padding: 32, textAlign: "center" }}>
          <div style={{ marginBottom: 24 }}><Logo /></div>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🗺️</div>
          <h1 style={{ fontSize: 24, fontWeight: 800, color: COLORS.text, marginBottom: 8 }}>Welcome to StakeholderMap</h1>
          <p style={{ color: COLORS.textMuted, fontSize: 14, marginBottom: 28, lineHeight: 1.6 }}>
            Map stakeholders, get AI-powered strategies, and draft tailored communications — all in one place.
          </p>
          <Button onClick={() => setStep(1)} style={{ width: "100%" }}>Get Started Free →</Button>
          <p style={{ color: COLORS.textDim, fontSize: 12, marginTop: 12 }}>Free for up to 10 stakeholders. No credit card required.</p>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ maxWidth: 400, width: "100%", padding: 32 }}>
        <div style={{ marginBottom: 24, textAlign: "center" }}><Logo /></div>
        <div style={{ background: COLORS.card, borderRadius: 14, padding: 28, border: `1px solid ${COLORS.border}` }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>Quick setup</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>So we can save your work and send you product updates.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Input label="Your name" value={name} onChange={setName} placeholder="Jane Smith" />
            <Input label="Email" value={email} onChange={setEmail} placeholder="jane@company.com" type="email" />
            <Button onClick={() => { if (email.trim() && name.trim()) onComplete({ email: email.trim(), name: name.trim() }); }}
              disabled={!email.trim() || !name.trim()} style={{ width: "100%", marginTop: 4 }}>

            </Button>

          <button onClick={() => onComplete({ email: "", name: "User" })}
            style={{ background: "none", border: "none", color: COLORS.textDim, fontSize: 12, cursor: "pointer", marginTop: 12, fontFamily: "inherit", width: "100%", textAlign: "center" }}>
            Skip for now
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Stakeholder Form ──
function StakeholderForm({ onAdd, onCancel, editing }) {
  const [name, setName] = useState(editing?.name || "");
  const [role, setRole] = useState(editing?.role || "");
  const [dept, setDept] = useState(editing?.department || "");
  const [influence, setInfluence] = useState(editing?.influence ?? 50);
  const [interest, setInterest] = useState(editing?.interest ?? 50);
  const [sentiment, setSentiment] = useState(editing?.sentiment || "neutral");
  const [notes, setNotes] = useState(editing?.notes || "");
  const q = classifyStakeholder(influence, interest);
  const meta = QUADRANT_META[q];

  return (
    <div style={{ background: COLORS.card, borderRadius: 14, padding: 24, border: `1px solid ${COLORS.border}`, display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 16, fontWeight: 700, color: COLORS.text }}>{editing ? "Edit Stakeholder" : "Add Stakeholder"}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Input label="Name" value={name} onChange={setName} placeholder="Jane Smith" />
        <Input label="Role / Title" value={role} onChange={setRole} placeholder="VP Engineering" />
      </div>
      <Input label="Department" value={dept} onChange={setDept} placeholder="Engineering" />
      <Slider label="Influence / Power" value={influence} onChange={setInfluence} leftLabel="Low power" rightLabel="High power" />
      <Slider label="Interest / Impact" value={interest} onChange={setInterest} leftLabel="Low interest" rightLabel="High interest" />
      <div>
        <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, display: "block" }}>Sentiment</label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {["champion", "supportive", "neutral", "resistant", "blocker"].map(s => (
            <button key={s} onClick={() => setSentiment(s)} style={{
              padding: "6px 12px", borderRadius: 6, border: `1px solid ${sentiment === s ? COLORS.accent : COLORS.border}`,
              background: sentiment === s ? COLORS.accentGlow : "transparent",
              color: sentiment === s ? COLORS.accent : COLORS.textMuted,
              fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", textTransform: "capitalize",
            }}>{s}</button>
          ))}
        </div>
      </div>
      <div>
        <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, display: "block" }}>Notes</label>
        <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Key concerns, motivations..."
          style={{ width: "100%", minHeight: 60, padding: "10px 14px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.text, fontSize: 14, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
      </div>

// ── Quadrant Map ──
function QuadrantMap({ stakeholders, onSelect, selected, filter }) {
  const sentimentColors = { champion: COLORS.green, supportive: "#6DD4A0", neutral: COLORS.yellow, resistant: "#FF9B6A", blocker: COLORS.warm };

  return (
    <div style={{ background: COLORS.card, borderRadius: 14, padding: 20, border: `1px solid ${COLORS.border}` }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text, marginBottom: 12 }}>Influence / Interest Matrix</div>
      <div style={{ position: "relative", width: "100%", aspectRatio: "1.4 / 1", background: COLORS.surface, borderRadius: 10, overflow: "hidden" }}>
        <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: COLORS.border }} />
        <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: 1, background: COLORS.border }} />
        {[
          { label: "Keep Satisfied", x: "25%", y: "25%", q: "Keep Satisfied" },
          { label: "Manage Closely", x: "75%", y: "25%", q: "Manage Closely" },
          { label: "Monitor", x: "25%", y: "75%", q: "Monitor" },
          { label: "Keep Informed", x: "75%", y: "75%", q: "Keep Informed" },
        ].map(ql => (
          <div key={ql.label} style={{ position: "absolute", left: ql.x, top: ql.y, transform: "translate(-50%, -50%)", fontSize: 11, fontWeight: 600, color: QUADRANT_META[ql.q].color, opacity: 0.4, textTransform: "uppercase", letterSpacing: "0.06em", pointerEvents: "none" }}>{ql.label}</div>
        ))}
        <div style={{ position: "absolute", left: 8, top: "50%", transform: "translateY(-50%) rotate(-90deg)", fontSize: 10, color: COLORS.textDim, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>INFLUENCE →</div>
        <div style={{ position: "absolute", bottom: 6, left: "50%", transform: "translateX(-50%)", fontSize: 10, color: COLORS.textDim, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>INTEREST →</div>
        {stakeholders.map(s => {
          const x = 5 + (s.interest / 100) * 90;
          const y = 95 - (s.influence / 100) * 90;
          const isSelected = selected === s.id;
          const dotColor = sentimentColors[s.sentiment] || COLORS.accent;
          const isDimmed = filter && s.quadrant !== filter;
          return (
            <div key={s.id} onClick={() => onSelect(s.id)} style={{ position: "absolute", left: `${x}%`, top: `${y}%`, transform: "translate(-50%, -50%)", cursor: "pointer", zIndex: isSelected ? 10 : isDimmed ? 0 : 1, opacity: isDimmed ? 0.15 : 1, transition: "opacity 0.3s" }}>
              <div style={{ width: isSelected ? 18 : 14, height: isSelected ? 18 : 14, borderRadius: "50%", background: dotColor, boxShadow: isSelected ? `0 0 16px ${dotColor}88` : `0 0 6px ${dotColor}44`, border: isSelected ? "2px solid #fff" : "2px solid transparent", transition: "all 0.2s" }} />
              <div style={{ position: "absolute", top: -22, left: "50%", transform: "translateX(-50%)", whiteSpace: "nowrap", fontSize: 10, fontWeight: 600, color: isSelected ? "#fff" : COLORS.textMuted, background: isSelected ? COLORS.surfaceHover : "transparent", padding: isSelected ? "2px 6px" : 0, borderRadius: 4 }}>{s.name.split(" ")[0]}</div>
            </div>
          );
        })}
        {stakeholders.length === 0 && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.textDim, fontSize: 13, fontStyle: "italic" }}>Add stakeholders to see them plotted here</div>
        )}
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 10, flexWrap: "wrap" }}>
        {Object.entries(sentimentColors).map(([k, c]) => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: c }} />
            <span style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "capitalize" }}>{k}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── AI Panel ──
function AIPanel({ stakeholders, isPro }) {
  const [analysis, setAnalysis] = useState("");
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("strategy");
  const modes = {
    strategy: { label: "Strategy Brief", icon: "🎯", prompt: "Analyze these stakeholders and provide a concise stakeholder engagement strategy. Include: 1) Top 3 risks, 2) Quick wins, 3) Coalition-building opportunities. Be specific and actionable." },
    comms: { label: "Comms Plan", icon: "📣", prompt: "Create a communication plan for these stakeholders. For each quadrant group, specify: message framing, channel, frequency, and tone." },
    risks: { label: "Risk Analysis", icon: "⚠️", prompt: "Identify the top risks in this stakeholder landscape. Consider: blockers, misaligned expectations, power dynamics, missing champions. Provide mitigation strategies." },
  };

  const runAnalysis = async () => {
    if (stakeholders.length === 0) return;
    setLoading(true); setAnalysis("");
    const summary = stakeholders.map(s => `- ${s.name} (${s.role}, ${s.department}): Influence=${s.influence}%, Interest=${s.interest}%, Sentiment=${s.sentiment}, Quadrant=${s.quadrant}${s.notes ? `, Notes: ${s.notes}` : ""}`).join("\n");
    const result = await callAI(`Here are the stakeholders:\n${summary}\n\n${modes[mode].prompt}`, "You are an expert stakeholder management consultant. Provide clear, practical, actionable advice. Use short paragraphs. Be direct. Format with **bold** for key terms.");
    setAnalysis(result); setLoading(false);
  };

  if (!isPro) {
    return (
      <div style={{ background: COLORS.card, borderRadius: 14, padding: 32, border: `1px solid ${COLORS.border}`, textAlign: "center" }}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>🔒</div>
        <h3 style={{ color: COLORS.text, marginBottom: 8 }}>AI Analysis — Pro Feature</h3>
        <p style={{ color: COLORS.textMuted, fontSize: 14, marginBottom: 20, maxWidth: 360, margin: "0 auto 20px" }}>Upgrade to Pro to unlock AI-powered strategy briefs, communication plans, and risk analysis.</p>
        <Button variant="warm">Upgrade to Pro — €19/mo</Button>
      </div>
    );
  }

  return (
    <div style={{ background: COLORS.card, borderRadius: 14, padding: 20, border: `1px solid ${COLORS.border}` }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text, marginBottom: 14 }}>🤖 AI Analysis</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        {Object.entries(modes).map(([k, v]) => (
          <button key={k} onClick={() => setMode(k)} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${mode === k ? COLORS.accent : COLORS.border}`, background: mode === k ? COLORS.accentGlow : "transparent", color: mode === k ? COLORS.accent : COLORS.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{v.icon} {v.label}</button>
        ))}
      </div>
      <Button onClick={runAnalysis} disabled={loading || stakeholders.length === 0} style={{ width: "100%", marginBottom: 14 }}>
        {loading ? "Analyzing..." : `Generate ${modes[mode].label}`}
      </Button>
      {analysis && (
        <div style={{ padding: 16, borderRadius: 10, background: COLORS.surface, border: `1px solid ${COLORS.border}`, fontSize: 13, color: COLORS.text, lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 400, overflowY: "auto" }}
          dangerouslySetInnerHTML={{ __html: analysis.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#4F8BFF">$1</strong>') }} />
      )}
      {stakeholders.length === 0 && <div style={{ fontSize: 13, color: COLORS.textDim, textAlign: "center", padding: 20, fontStyle: "italic" }}>Add stakeholders first</div>}
    </div>
  );
}

// ── Saved Plans ──
function SavedPlans({ current, onLoad }) {
  const [plans, setPlans] = useState([]);
  const [showSave, setShowSave] = useState(false);
  const [planName, setPlanName] = useState("");
  useEffect(() => { loadData(PLANS_KEY).then(p => p && setPlans(p)); }, []);
  const savePlan = async () => {
    if (!planName.trim() || current.length === 0) return;
    const updated = [...plans, { id: Date.now().toString(), name: planName.trim(), stakeholders: current, date: new Date().toLocaleDateString() }];
    setPlans(updated); await saveData(PLANS_KEY, updated); setPlanName(""); setShowSave(false);
  };
  const deletePlan = async (id) => { const updated = plans.filter(p => p.id !== id); setPlans(updated); await saveData(PLANS_KEY, updated); };

  return (
    <div style={{ background: COLORS.card, borderRadius: 14, padding: 20, border: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>📁 Saved Plans</div>
        <Button small onClick={() => setShowSave(!showSave)} disabled={current.length === 0}>{showSave ? "Cancel" : "Save Current"}</Button>
      </div>
      {showSave && (
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <Input value={planName} onChange={setPlanName} placeholder="Plan name..." style={{ flex: 1 }} />
          <Button small onClick={savePlan} disabled={!planName.trim()}>Save</Button>
        </div>
      )}
      {plans.length === 0 ? <div style={{ fontSize: 13, color: COLORS.textDim, textAlign: "center", padding: 16, fontStyle: "italic" }}>No saved plans yet</div> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {plans.map(p => (
            <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", borderRadius: 8, background: COLORS.surface, border: `1px solid ${COLORS.border}` }}>
              <div>
                <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>{p.name}</span>
                <span style={{ fontSize: 11, color: COLORS.textDim, marginLeft: 8 }}>{p.stakeholders.length} · {p.date}</span>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                <Button small variant="secondary" onClick={() => onLoad(p.stakeholders)}>Load</Button>
                <Button small variant="danger" onClick={() => deletePlan(p.id)}>✕</Button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Bulk Import ──
function BulkImport({ onImport, isPro }) {
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  // Local fallback parser — works without AI for simple "Name — Role, notes" format
  const localParse = (raw) => {
    const lines = raw.split("\n").map(l => l.replace(/^\d+[\.\)]\s*/, "").trim()).filter(Boolean);
    return lines.map(line => {
      const parts = line.split(/\s*[—–-]\s*/);
      const name = (parts[0] || "Unknown").trim();
      const rest = parts.slice(1).join(" ").toLowerCase();
      const role = (parts[1] || "").split(",")[0].trim();
      const dept = "";
      let influence = 50, interest = 50, sentiment = "neutral";
      if (rest.includes("very high influence") || rest.includes("very high power")) influence = 90;
      else if (rest.includes("high influence") || rest.includes("high power")) influence = 75;
      else if (rest.includes("low influence") || rest.includes("low power")) influence = 25;
      else if (rest.includes("moderate influence")) influence = 50;
      if (rest.includes("very high interest")) interest = 90;
      else if (rest.includes("high interest")) interest = 75;
      else if (rest.includes("low interest")) interest = 25;
      else if (rest.includes("moderate interest")) interest = 50;
      if (rest.includes("champion") || rest.includes("strong champion")) sentiment = "champion";
      else if (rest.includes("supportive") || rest.includes("supports")) sentiment = "supportive";
      else if (rest.includes("blocker") || rest.includes("blocking")) sentiment = "blocker";
      else if (rest.includes("resistant") || rest.includes("skeptical") || rest.includes("worried") || rest.includes("concerned")) sentiment = "resistant";
      const notes = parts.slice(1).join(" — ").trim();
      return { name, role, department: dept, influence, interest, sentiment, notes };
    });
  };

  const parseWithAI = async () => {
    setLoading(true); setError("");
    try {
      const result = await callAI(
        `Parse this stakeholder list into a JSON array. For each person, estimate influence (0-100), interest (0-100), and sentiment (champion/supportive/neutral/resistant/blocker) based on the context clues in the text. Return ONLY the JSON array, nothing else — no markdown, no explanation, no code fences.\n\nRequired format: [{"name":"...","role":"...","department":"...","influence":50,"interest":50,"sentiment":"neutral","notes":"..."}]\n\nHere is the list:\n${text}`,
        "You are a JSON data parser. You MUST return ONLY a raw JSON array. No markdown code fences. No explanation. No preamble. Just the [ ... ] array.",
        4096
      );
      const clean = result.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
      const parsed = JSON.parse(clean);
      if (Array.isArray(parsed) && parsed.length > 0) { onImport(parsed); setText(""); return; }
      throw new Error("Empty result");
    } catch (e) {
      console.warn("AI parse failed, using local parser:", e);
      // Fallback to local parser
      const fallback = localParse(text);
      if (fallback.length > 0) {
        onImport(fallback);
        setText("");
        setError("");
      } else {
        setError("Could not parse. Try one stakeholder per line: Name — Role, notes");
      }
    } finally {
      setLoading(false);
    }
  };

  if (!isPro) {
    return (
      <div style={{ background: COLORS.card, borderRadius: 14, padding: 20, border: `1px solid ${COLORS.border}`, textAlign: "center" }}>
        <div style={{ fontSize: 24, marginBottom: 8 }}>🔒</div>
        <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>Bulk Import — Pro</div>
        <p style={{ fontSize: 12, color: COLORS.textMuted }}>Upgrade to paste stakeholder lists and let AI parse them.</p>
      </div>
    );
  }

  return (
    <div style={{ background: COLORS.card, borderRadius: 14, padding: 20, border: `1px solid ${COLORS.border}` }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text, marginBottom: 6 }}>⚡ Bulk Import</div>
      <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12 }}>Paste a list in any format — AI will parse it.</div>
      <textarea value={text} onChange={e => setText(e.target.value)}
        placeholder={"Jane Smith — VP Eng, very influential, supports the change\nBob Jones — CFO, skeptical about budget"}
        style={{ width: "100%", minHeight: 100, padding: "12px 14px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.text, fontSize: 13, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box", lineHeight: 1.5 }} />
      <Button onClick={parseWithAI} disabled={!text.trim() || loading} style={{ marginTop: 10, width: "100%" }}>
        {loading ? "Parsing..." : "Import with AI"}
      </Button>
      {error && <div style={{ marginTop: 8, padding: "8px 12px", borderRadius: 8, background: COLORS.warmGlow, color: COLORS.warm, fontSize: 12 }}>{error}</div>}
    </div>
  );
}

// ── Main App ──
function App() {
  const [stakeholders, setStakeholders] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [selected, setSelected] = useState(null);
  const [tab, setTab] = useState("map");
  const [loaded, setLoaded] = useState(false);
  const [user, setUser] = useState(null);
  const [userChecked, setUserChecked] = useState(false);
  const [isPro, setIsPro] = useState(true); // Default to Pro for demo — connect to Stripe for production
  const [filter, setFilter] = useState(null); // null = show all, or a quadrant name

  useEffect(() => {
    Promise.all([loadData(STORAGE_KEY), loadData(USER_KEY)]).then(([d, u]) => {
      if (d) setStakeholders(d);
      if (u) setUser(u);
      setUserChecked(true);
      setLoaded(true);
    });
  }, []);

  useEffect(() => { if (loaded) saveData(STORAGE_KEY, stakeholders); }, [stakeholders, loaded]);

  const handleOnboard = async (u) => {
    setUser(u);
    await saveData(USER_KEY, u);
  };

  if (!userChecked) return null;
  if (!user) return <Onboarding onComplete={handleOnboard} />;

  const addStakeholder = (s) => {
    if (editing) {
      setStakeholders(prev => prev.map(p => p.id === editing.id ? { ...s, id: editing.id } : p));
      setEditing(null);
    } else {
      if (!isPro && stakeholders.length >= FREE_LIMIT) { alert(`Free plan allows up to ${FREE_LIMIT} stakeholders. Upgrade to Pro for unlimited.`); return; }
      setStakeholders(prev => [...prev, { ...s, id: Date.now().toString() }]);
    }
    setShowForm(false);
  };

  const deleteStakeholder = (id) => { setStakeholders(prev => prev.filter(p => p.id !== id)); if (selected === id) setSelected(null); };

  const importStakeholders = (list) => {
    const newOnes = list.map((s, i) => ({ ...s, id: (Date.now() + i).toString(), quadrant: classifyStakeholder(s.influence, s.interest) }));
    setStakeholders(prev => [...prev, ...newOnes]);
  };

  const tabs = [
    { id: "map", label: "Map", icon: "🗺️" },
    { id: "analysis", label: "AI Analysis", icon: "🤖" },
    { id: "messages", label: "Messages", icon: "✉️" },
    { id: "export", label: "Export", icon: "📤" },
    { id: "manage", label: "Manage", icon: "⚙️" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, color: COLORS.text, fontFamily: "'DM Sans', 'Segoe UI', system-ui, sans-serif" }}>
      <div style={{
        padding: "12px 24px", borderBottom: `1px solid ${COLORS.border}`,
        display: "flex", justifyContent: "space-between", alignItems: "center",
        background: `${COLORS.surface}cc`, backdropFilter: "blur(12px)",
        position: "sticky", top: 0, zIndex: 50,
      }}>
        <Logo />
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {isPro && <Badge color={COLORS.green} glow={COLORS.greenGlow}>PRO</Badge>}
          {!isPro && <Badge color={COLORS.yellow} glow={COLORS.yellowGlow}>FREE · {stakeholders.length}/{FREE_LIMIT}</Badge>}
          <span style={{ fontSize: 12, color: COLORS.textDim }}>{user.name}</span>
          <Button small onClick={() => { setEditing(null); setShowForm(true); }}>+ Add</Button>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "20px 20px 60px" }}>
        {stakeholders.length > 0 && <div style={{ marginBottom: 16 }}><Stats stakeholders={stakeholders} filter={filter} onFilter={setFilter} /></div>}
        <div style={{ marginBottom: 16 }}><Tabs tabs={tabs} active={tab} onChange={setTab} /></div>
        {showForm && <div style={{ marginBottom: 16 }}><StakeholderForm onAdd={addStakeholder} onCancel={() => { setShowForm(false); setEditing(null); }} editing={editing} /></div>}

        {(() => {
          const filtered = filter ? stakeholders.filter(s => s.quadrant === filter) : stakeholders;
          return <>
            {tab === "map" && (
              <div style={{ display: "grid", gridTemplateColumns: stakeholders.length > 0 ? "1fr 320px" : "1fr", gap: 16 }}>
                <QuadrantMap stakeholders={stakeholders} onSelect={setSelected} selected={selected} filter={filter} />
                {stakeholders.length > 0 && (
                  <div>
                    {filter && <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: QUADRANT_META[filter].color }}>{QUADRANT_META[filter].icon} {filter} ({filtered.length})</span>
                      <Button variant="ghost" small onClick={() => setFilter(null)}>✕ Clear</Button>
                    </div>}
                    <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 520, overflowY: "auto" }}>
                      {filtered.map(s => (
                        <StakeholderCard key={s.id} s={s} isSelected={selected === s.id} onSelect={setSelected}
                          onEdit={s => { setEditing(s); setShowForm(true); }} onDelete={deleteStakeholder} />
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {tab === "analysis" && <AIPanel stakeholders={filtered} isPro={isPro} />}
            {tab === "messages" && <DraftMessage stakeholders={filtered} isPro={isPro} />}
            {tab === "export" && <ExportPanel stakeholders={stakeholders} isPro={isPro} />}
            {tab === "manage" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <BulkImport onImport={importStakeholders} isPro={isPro} />
                <SavedPlans current={stakeholders} onLoad={(list) => { setStakeholders(list); setSelected(null); setFilter(null); }} />
              </div>
            )}
          </>;
        })()}

        {stakeholders.length === 0 && !showForm && (
          <div style={{ textAlign: "center", padding: "48px 20px", background: COLORS.card, borderRadius: 14, border: `1px solid ${COLORS.border}`, marginTop: 16 }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🗺️</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, marginBottom: 6 }}>Map your stakeholders</div>
            <div style={{ fontSize: 14, color: COLORS.textMuted, marginBottom: 20, maxWidth: 400, margin: "0 auto 20px" }}>
              Add stakeholders one-by-one, or use Bulk Import in the Manage tab.
            </div>
            <Button onClick={() => setShowForm(true)}>+ Add Your First Stakeholder</Button>
          </div>
        )}
      </div>
    </div>
  );
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
